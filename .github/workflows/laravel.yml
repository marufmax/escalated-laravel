name: escalated-laravel tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout escalated-laravel
        uses: actions/checkout@v4
        with:
          path: escalated-laravel

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Create Laravel host application
        run: composer create-project laravel/laravel laravel --no-interaction

      - name: Install escalated-laravel into host
        working-directory: laravel
        run: |
          composer config repositories.escalated path ../escalated-laravel
          composer require escalated-dev/escalated-laravel:@dev --no-interaction

      - name: Install Pest in host
        working-directory: laravel
        run: composer require pestphp/pest pestphp/pest-plugin-laravel --dev --no-interaction

      - name: Prepare Laravel environment
        working-directory: laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run escalated package tests (Pest)
        working-directory: laravel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: vendor/bin/pest ../escalated-laravel/tests
